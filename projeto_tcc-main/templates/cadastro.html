    <h1 id="titulo_cadastro">CADASTRO DE NOVOS ITENS</h1>
    <br>

    <!-- AQUI COMEÇA O FORMULARIO PARA ADICIONAR ITENS NA APLICACAI -->
    <div id="form_cadastro">
        <form action="/cadastro_concluido.html" method="POST">
            <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">Nome do item:</span>
            <input type="text" class="form-control" placeholder="Nome" aria-label="Username" aria-describedby="basic-addon1" name="nome_item">
            </div>

            <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">Descrição:</span>
            <input type="text" class="form-control" placeholder="Descrição" aria-label="Username" aria-describedby="basic-addon1" name="descricao">
            </div>

            <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">Preço:</span>
            <input type="text" class="form-control" placeholder="Preço" aria-label="Username" aria-describedby="basic-addon1" name="preco">
            </div>

            <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">Quantidade inicial:</span>
            <input type="text" class="form-control" placeholder="Quantidade" aria-label="Username" aria-describedby="basic-addon1" name="qtde">
            </div>

            <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">Link para foto:</span>
            <input type="text" class="form-control" placeholder="Foto" aria-label="Username" aria-describedby="basic-addon1" name="foto">
            </div>

            <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">Categoria:</span>
            <input type="text" class="form-control" placeholder="Categoria" aria-label="Username" aria-describedby="basic-addon1" name="categoria">
            </div>

            <div class="input-group mb-3">
            <span class="input-group-text" id="basic-addon1">Estoque minimo:</span>
            <input type="text" class="form-control" placeholder="Unidades" aria-label="Username" aria-describedby="basic-addon1" name="estoque_min">
            </div>


            <button type="submit" class="btn btn-success">Cadastrar</button>
        </form>
    </div>
